{% extends 'portfolio/base.html' %}

{% block content %}
<div class="page-header">
    <h2 class="page-title">{{ titulo }}</h2>
</div>

<article class="form-card">
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-field">
            <label for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<p class="form-error">{{ field.errors|join:", " }}</p>{% endif %}
            {% if field.help_text %}<p class="form-help">{{ field.help_text }}</p>{% endif %}
        </div>
        {% endfor %}
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a href="{% url 'competencias' %}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</article>
{% endblock %}
