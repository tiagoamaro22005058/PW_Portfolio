<!-- templates/portfolio/base.html -->

<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'portfolio/styles.css' %}">
</head>
<body>
    <header>
        <h1><a href="{% url 'portfolio_home' %}">Portfolio</a></h1>
        <nav>
            <a href="{% url 'licenciaturas' %}">Licenciaturas</a>
            <a href="{% url 'ucs' %}">Unidades Curriculares</a>
            <a href="{% url 'tecnologias' %}">Tecnologias</a>
            <a href="{% url 'projetos' %}">Projetos</a>
            <a href="{% url 'competencias' %}">Competências</a>
            <a href="{% url 'formacoes' %}">Formações</a>
            <a href="{% url 'making_of' %}">Making Of</a>
            <a href="{% url 'sobre' %}">Sobre</a>
            <a href="{% url 'lista_artigos' %}">Artigos</a>
        </nav>
        <div style="display:flex; align-items:center; gap:10px; margin-left:auto;">
            {% if request.user.is_authenticated %}
                <span style="color:#b8977a; font-size:13px; font-weight:500;">{{ request.user.username }}</span>
                <form method="post" action="{% url 'logout_view' %}" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" style="background:transparent; border:1.5px solid #b8977a; color:#b8977a; font-size:13px; font-weight:600; padding:5px 14px; border-radius:999px; cursor:pointer; transition:background 0.15s, color 0.15s;">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'login_view' %}" style="color:#b8977a; border:1.5px solid #b8977a; font-size:13px; font-weight:600; padding:5px 14px; border-radius:999px; text-decoration:none; transition:background 0.15s, color 0.15s;">Login</a>
            {% endif %}
        </div>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <p>&copy; 2026</p>
        <a href="{% url 'cursos' %}" class="escola-link">Escola</a>
    </footer>

</body>
</html>
