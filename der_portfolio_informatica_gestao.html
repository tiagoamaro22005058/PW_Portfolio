<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DER — Portfólio Informática de Gestão</title>
<style>
  body { margin: 0; padding: 24px; font-family: sans-serif; background: #fff; color: #1a1a1a; }
  h1 { font-size: 18px; font-weight: 500; margin: 0 0 4px; }
  p  { font-size: 13px; color: #666; margin: 0 0 20px; }
  #erd { width: 100%; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a1a; color: #e0e0e0; }
    p { color: #999; }
  }
</style>
</head>
<body>
<h1>DER — Portfólio Informática de Gestão</h1>
<p>Diagrama Entidade-Relação gerado para a Ficha 6 — Modelação do Portfólio</p>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: 'sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2840' : '#EEEDFE',
    primaryTextColor: dark ? '#c2c0b6' : '#3C3489',
    primaryBorderColor: '#534AB7',
    secondaryColor: dark ? '#1a2a1a' : '#EAF3DE',
    tertiaryColor: dark ? '#1a2828' : '#E1F5EE',
  },
});

const diagram = `erDiagram
  LICENCIATURA {
    int id PK
    string nome
    string sigla
    string grau
    int duracao_anos
    string url_deisi
    string url_lusofona
    string descricao
    string imagem
  }

  UNIDADE_CURRICULAR {
    int id PK
    int licenciatura_id FK
    string nome
    string sigla
    int ano
    int semestre
    int ects
    string descricao
    string imagem
    string url_ficha
    boolean concluida
  }

  DOCENTE {
    int id PK
    string nome
    string url_perfil_lusofona
    string email
    string foto
  }

  PROJETO {
    int id PK
    int uc_id FK
    string titulo
    string descricao
    string conceitos_aplicados
    string tecnologias_usadas
    string imagem
    string url_video_demo
    string url_github
    int ano_realizacao
    int nota
  }

  TECNOLOGIA {
    int id PK
    string nome
    string tipo
    string descricao
    string logo
    string url_website
    int nivel_interesse
    string categoria
  }

  TFC {
    int id PK
    string titulo
    string resumo
    string autor
    int ano
    string orientador
    string url_documento
    string area_tematica
    int classificacao_interesse
  }

  COMPETENCIA {
    int id PK
    string nome
    string tipo
    string nivel
    string descricao
  }

  FORMACAO {
    int id PK
    string titulo
    string instituicao
    string tipo
    date data_inicio
    date data_fim
    string certificado_url
    string descricao
  }

  MAKING_OF {
    int id PK
    string entidade_relacionada
    int entidade_id
    string descricao_decisao
    string erros_correcoes
    string justificacao_modelacao
    string foto_papel
    string uso_ia
    datetime data_registo
  }

  EVENTO {
    int id PK
    string nome
    string tipo
    string descricao
    date data
    string local
    string url
    string resultado
    string imagem
  }

  LICENCIATURA ||--o{ UNIDADE_CURRICULAR : "tem"
  UNIDADE_CURRICULAR }o--o{ DOCENTE : "lecionada por"
  UNIDADE_CURRICULAR ||--o{ PROJETO : "origina"
  PROJETO }o--o{ TECNOLOGIA : "usa"
  TECNOLOGIA }o--o{ COMPETENCIA : "desenvolve"
  PROJETO }o--o{ COMPETENCIA : "demonstra"
  FORMACAO }o--o{ COMPETENCIA : "certifica"
  EVENTO }o--o{ TECNOLOGIA : "envolve"
  EVENTO }o--o{ COMPETENCIA : "desenvolve"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
</body>
</html>
